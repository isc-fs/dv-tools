name: Close linked issues on merge to dev

# GitHub only auto-closes issues referenced by `Closes #N` when the PR is merged
# into the repository's default branch. Our workflow merges feat/fix PRs into
# `dev` instead, so this workflow reproduces the behaviour by parsing the PR
# body for the standard closing keywords and closing each referenced issue.

on:
  pull_request:
    types: [closed]
    branches:
      - dev

jobs:
  close-linked:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Close issues referenced by the PR body
        uses: actions/github-script@v7
        env:
          PR_BODY:   ${{ github.event.pull_request.body }}
          PR_TITLE:  ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE:   ${{ github.event.pull_request.base.ref }}
        with:
          script: |
            const body    = process.env.PR_BODY  || '';
            const title   = process.env.PR_TITLE || '';
            const prNum   = parseInt(process.env.PR_NUMBER, 10);
            const baseRef = process.env.PR_BASE;

            /* GitHub's own closing keywords:
                 close, closes, closed, fix, fixes, fixed,
                 resolve, resolves, resolved
               Followed by an optional colon and `#N`. */
            const pattern = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*:?\s*#(\d+)/gi;

            const text = `${title}\n${body}`;
            const numbers = new Set();
            for (const m of text.matchAll(pattern)) {
              numbers.add(parseInt(m[1], 10));
            }

            if (numbers.size === 0) {
              console.log('No closing-keyword references found in PR body or title.');
              return;
            }

            for (const n of numbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: n,
                });
                if (issue.pull_request) {
                  console.log(`#${n} is a PR, skipping.`);
                  continue;
                }
                if (issue.state === 'closed') {
                  console.log(`#${n} already closed, skipping.`);
                  continue;
                }
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: n,
                  state: 'closed',
                  state_reason: 'completed',
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: n,
                  body:  `Closed by #${prNum} (merged into \`${baseRef}\`).`,
                });
                console.log(`Closed #${n}.`);
              } catch (err) {
                console.log(`Could not close #${n}: ${err.message}`);
              }
            }

      - name: Close the branch's tracking issue by name
        uses: actions/github-script@v7
        env:
          HEAD_REF:  ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE:   ${{ github.event.pull_request.base.ref }}
        with:
          # branch-issue.yml opens a `[feat/N-...]` / `[fix/N-...]` tracking issue
          # per branch. The step above only closes issues a PR explicitly names
          # with `Closes #N`, which is easy to forget — so also close the stub by
          # matching its `[<branch>]` title to the PR's head branch. This makes a
          # tracking issue close on merge whether or not the PR referenced it.
          script: |
            const headRef = process.env.HEAD_REF || '';
            const prNum   = parseInt(process.env.PR_NUMBER, 10);
            const baseRef = process.env.PR_BASE;

            // Only feat/** and fix/** branches have a `[branch]` tracking stub.
            if (!/^(feat|fix)\//.test(headRef)) {
              console.log(`Head ref "${headRef}" is not a feat/fix branch, skipping.`);
              return;
            }

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const tracking = issues.find(
              (i) => !i.pull_request && i.title.startsWith(`[${headRef}]`),
            );
            if (!tracking) {
              console.log(`No open tracking issue titled "[${headRef}]".`);
              return;
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: tracking.number,
              state: 'closed',
              state_reason: 'completed',
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: tracking.number,
              body:  `Closed automatically — branch \`${headRef}\` merged via #${prNum} into \`${baseRef}\`.`,
            });
            console.log(`Closed tracking issue #${tracking.number} for [${headRef}].`);
