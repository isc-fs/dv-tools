name: ISC MingoROS Release

# Release pipeline for the ISC MingoROS surfaces — the same OS coverage MingoCAN
# (can-flasher) and WarioCharger ship:
#
#   ISC MingoROS (Tauri desktop app):
#     Linux   →  .deb  .AppImage  .rpm
#     macOS   →  .dmg  (universal — Apple Silicon + Intel)
#     Windows →  .msi  + NSIS .exe
#   mingoros CLI (Rust binary):
#     Linux x86_64 / aarch64, macOS aarch64 / x86_64, Windows x86_64
#
# A `mingoros-v*` tag (e.g. `mingoros-v0.2.0`) builds everything in parallel and
# attaches the artefacts to one GitHub Release. `workflow_dispatch` is a manual
# dry-run (workflow artifacts only, no Release).
#
# Windows link note: the ros2/RustDDS transport pulls `pnet`, whose Windows
# backend links Packet.lib / wpcap.lib. The Windows jobs install the Npcap SDK
# and point the linker at it. (Running the Windows build also needs the Npcap
# runtime installed — same requirement as Wireshark / other pcap tools.)

on:
  push:
    tags:
      - 'mingoros-v*'
  workflow_dispatch:

concurrency:
  group: mingoros-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  NPCAP_SDK_VERSION: '1.13'

jobs:
  # ---- Version gate ------------------------------------------
  # Every version-of-truth file must agree with the pushed tag. Catches the
  # "tagged mingoros-v0.2.0 but Cargo.toml still says 0.1.0" mistake before any
  # artefact is produced. Skipped on manual dispatch (nothing to compare).
  verify-version:
    name: verify tag matches source versions
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare versions across all files
        run: |
          set -eu
          TAG_VERSION="${GITHUB_REF_NAME#mingoros-v}"
          CORE=$(awk -F'"' '/^version/ {print $2; exit}' mingoros/crates/mingoros-core/Cargo.toml)
          CLI=$(awk -F'"' '/^version/ {print $2; exit}' mingoros/crates/mingoros-cli/Cargo.toml)
          STUDIO=$(awk -F'"' '/^version/ {print $2; exit}' mingoros/apps/mingoros-studio/src-tauri/Cargo.toml)
          PKG=$(node -p "require('./mingoros/apps/mingoros-studio/package.json').version")
          TAURI=$(node -p "require('./mingoros/apps/mingoros-studio/src-tauri/tauri.conf.json').version")
          mism=""
          [ "$TAG_VERSION" = "$CORE" ]   || mism="$mism mingoros-core=$CORE"
          [ "$TAG_VERSION" = "$CLI" ]    || mism="$mism mingoros-cli=$CLI"
          [ "$TAG_VERSION" = "$STUDIO" ] || mism="$mism studio-cargo=$STUDIO"
          [ "$TAG_VERSION" = "$PKG" ]    || mism="$mism package.json=$PKG"
          [ "$TAG_VERSION" = "$TAURI" ]  || mism="$mism tauri.conf=$TAURI"
          if [ -n "$mism" ]; then
            echo "::error::tag $GITHUB_REF_NAME implies version $TAG_VERSION, but source files disagree:$mism"
            echo "::error::Bump all five to $TAG_VERSION and retag (or delete the tag and re-cut)."
            exit 1
          fi
          echo "✓ all five source files agree on version $TAG_VERSION"

  # ---- Release page (created once, before builds attach) ------
  create-release:
    name: create GitHub Release
    needs: verify-version
    if: github.ref_type == 'tag' && needs.verify-version.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            **ISC MingoROS** — the DV-stack ROS 2 topic debugger: the `mingoros` CLI + the ISC MingoROS desktop app.

            ### ISC MingoROS (desktop app)
            - **macOS**: `.dmg` (universal, ad-hoc signed — first launch needs **right-click → Open → confirm**)
            - **Linux**: `.deb`, `.AppImage`, or `.rpm`
            - **Windows**: `.msi` (preferred) or the NSIS `-setup.exe`.
              Requires **Npcap** installed (the RustDDS transport uses pcap libs) — https://npcap.com

            Connect the laptop to the car PC over wired Ethernet (same subnet); the app auto-joins ROS domain 0.

            ### CLI (`mingoros`)
            Pre-built binaries below (Linux x86_64 / aarch64, macOS aarch64 / x86_64, Windows x86_64), or build from source:
            ```bash
            git clone --branch ${{ github.ref_name }} https://github.com/isc-fs/dv-tools
            cargo install --path dv-tools/mingoros/crates/mingoros-cli --features ros2
            ```
            ---
            **Full commit log**: https://github.com/isc-fs/dv-tools/commits/${{ github.ref_name }}

  # ---- CLI binaries -------------------------------------------
  cli-build:
    name: cli (${{ matrix.target }})
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            apt_deps: libudev-dev libpcap-dev pkg-config
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            apt_deps: libudev-dev libpcap-dev pkg-config
          - target: aarch64-apple-darwin
            os: macos-latest
            apt_deps: ''
          - target: x86_64-apple-darwin
            os: macos-latest
            apt_deps: ''
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            apt_deps: ''
    defaults:
      run:
        working-directory: mingoros
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.apt_deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_deps }}

      - name: Install Npcap SDK (Windows — pnet/RustDDS link deps)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://npcap.com/dist/npcap-sdk-$env:NPCAP_SDK_VERSION.zip"
          curl.exe -L -o "$env:RUNNER_TEMP\npcap-sdk.zip" $url
          Expand-Archive "$env:RUNNER_TEMP\npcap-sdk.zip" -DestinationPath "$env:RUNNER_TEMP\npcap-sdk"
          "LIB=$env:RUNNER_TEMP\npcap-sdk\Lib\x64;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.95.0'
          target: ${{ matrix.target }}
          cache: false
          rustflags: ''

      - name: Build release binary (with the ros2 transport)
        run: cargo build --release --bin mingoros --features ros2 --target ${{ matrix.target }}

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          STAGE="mingoros-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          mkdir "$STAGE"
          cp "target/${{ matrix.target }}/release/mingoros" "$STAGE/"
          cp README.md "$STAGE/" 2>/dev/null || true
          tar -czf "$STAGE.tar.gz" "$STAGE"
          echo "archive=mingoros/$STAGE.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $stage = "mingoros-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/mingoros.exe" $stage
          if (Test-Path README.md) { Copy-Item README.md $stage }
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          "archive=mingoros/$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: ${{ env.archive }}
          retention-days: 7

      - name: Attach to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.archive }}
          fail_on_unmatched_files: true

  # ---- ISC MingoROS bundles --------------------------------
  studio-build:
    name: studio (${{ matrix.os }})
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            apt_deps: >-
              libwebkit2gtk-4.1-dev
              libgtk-3-dev
              libayatana-appindicator3-dev
              librsvg2-dev
              libudev-dev
              libpcap-dev
              pkg-config
            tauri_args: ''
          - os: macos-latest
            apt_deps: ''
            # Universal binary → one .dmg runs on Apple Silicon + Intel.
            tauri_args: '--target universal-apple-darwin'
          - os: windows-latest
            apt_deps: ''
            tauri_args: ''
    defaults:
      run:
        working-directory: mingoros/apps/mingoros-studio
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux WebKit / GTK build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_deps }}

      - name: Install Npcap SDK (Windows — pnet/RustDDS link deps)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://npcap.com/dist/npcap-sdk-$env:NPCAP_SDK_VERSION.zip"
          curl.exe -L -o "$env:RUNNER_TEMP\npcap-sdk.zip" $url
          Expand-Archive "$env:RUNNER_TEMP\npcap-sdk.zip" -DestinationPath "$env:RUNNER_TEMP\npcap-sdk"
          "LIB=$env:RUNNER_TEMP\npcap-sdk\Lib\x64;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.95.0'
          cache: false
          rustflags: ''

      - name: Add macOS universal targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache cargo registry + target/
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'mingoros -> target'

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Generate icons
        run: npx --yes @tauri-apps/cli@^2 icon src-tauri/icons/icon.png

      - name: Build + attach bundles to Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts (.app.tar.gz / .AppImage / NSIS) with the
          # minisign key whose PUBLIC half is in tauri.conf's plugins.updater.
          # If the secret is absent, tauri-action still bundles but skips signing
          # (the auto-updater then has nothing to verify — set the secret to ship
          # updates).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: mingoros/apps/mingoros-studio
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}

  # ---- Mirror to the public iskApps channel + signed update manifest --------
  #
  # The app's auto-updater (tauri-plugin-updater) polls
  #   https://raw.githubusercontent.com/isc-fs/iskapps/main/mingoros/latest.json
  # (set in tauri.conf's plugins.updater). This job publishes the installers +
  # signed updater artifacts to the shared isc-fs/iskapps release channel and
  # commits a combined Tauri `latest.json` (all platforms) there — the same
  # pattern WarioCharger uses. Mirrors so all team apps live in one place.
  #
  # Requires a repo secret RELEASES_REPO_TOKEN (a fine-grained PAT with
  # Contents: read & write on isc-fs/iskapps). Absent → the job logs a warning
  # and skips, so it never breaks a release.
  mirror-iskapps:
    name: mirror to iskApps + publish update manifest
    needs: [studio-build, cli-build]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Gate on the mirror token
        id: gate
        run: |
          if [ -z "${{ secrets.RELEASES_REPO_TOKEN }}" ]; then
            echo "::warning::RELEASES_REPO_TOKEN not set — skipping iskApps mirror."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release assets from dv-tools
        if: steps.gate.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          mkdir -p dist
          gh release download "${{ github.ref_name }}" --repo isc-fs/dv-tools --dir dist \
            --pattern '*.app.tar.gz' --pattern '*.app.tar.gz.sig' \
            --pattern '*.AppImage'   --pattern '*.AppImage.sig' \
            --pattern '*-setup.exe'  --pattern '*-setup.exe.sig' \
            --pattern '*.dmg' --pattern '*.deb' --pattern '*.rpm' --pattern '*.msi' \
            --pattern 'mingoros-*.tar.gz' --pattern 'mingoros-*.zip' || true
          ls -l dist

      - name: Publish to iskApps + commit latest.json
        if: steps.gate.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          V="${VERSION#mingoros-v}"
          BASE="https://github.com/isc-fs/iskapps/releases/download/${VERSION}"
          # 1. publish every asset to the versioned iskApps release
          gh release create "$VERSION" --repo isc-fs/iskapps \
            --title "ISC MingoROS ${V}" \
            --notes "Installers for ISC MingoROS ${V}." dist/* \
          || gh release upload "$VERSION" --repo isc-fs/iskapps dist/* --clobber
          # 2. build the combined Tauri update manifest (all platforms at once —
          #    tauri-action's per-OS latest.json would otherwise clobber).
          export V BASE
          export PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python3 - <<'PY'
          import glob, json, os, urllib.parse
          V, BASE, PUB = os.environ["V"], os.environ["BASE"], os.environ["PUB_DATE"]
          def first(pat):
              m = sorted(glob.glob(f"dist/{pat}"))
              return m[0] if m else None
          def entry(art):
              sig = art + ".sig"
              if not (art and os.path.exists(sig)):
                  return None
              return {"signature": open(sig).read().strip(),
                      "url": f"{BASE}/{urllib.parse.quote(os.path.basename(art))}"}
          plats = {}
          mac = entry(first("*.app.tar.gz"))
          if mac:  # universal .app serves both mac arches
              plats["darwin-aarch64"] = mac; plats["darwin-x86_64"] = mac
          lin = entry(first("*.AppImage"))
          if lin: plats["linux-x86_64"] = lin
          win = entry(first("*-setup.exe"))
          if win: plats["windows-x86_64"] = win
          if not plats:
              raise SystemExit("::error::no signed updater artifacts found — is TAURI_SIGNING_PRIVATE_KEY set?")
          manifest = {"version": V, "notes": f"ISC MingoROS {V}", "pub_date": PUB, "platforms": plats}
          open("latest.json", "w").write(json.dumps(manifest, indent=2))
          print(json.dumps(manifest, indent=2))
          PY
          # 3. commit the manifest to iskapps/mingoros/latest.json (the endpoint)
          CONTENT="$(base64 -w0 latest.json)"
          SHA="$(gh api repos/isc-fs/iskapps/contents/mingoros/latest.json --jq .sha 2>/dev/null || true)"
          gh api -X PUT repos/isc-fs/iskapps/contents/mingoros/latest.json \
            -f message="mingoros ${VERSION}: update manifest" \
            -f content="$CONTENT" \
            ${SHA:+-f sha="$SHA"}
          echo "✓ iskApps updated → https://raw.githubusercontent.com/isc-fs/iskapps/main/mingoros/latest.json"
