name: mingoros-studio CI

# Compile + frontend-build smoke check for the Tauri desktop app, on all three
# target OSes (matches MingoCAN's can-studio CI). Runs only when the Studio's
# own files change, so unrelated PRs don't pay the cross-platform build tax.
#
# Windows note: the ros2/RustDDS transport pulls `pnet`, whose Windows backend
# links Packet.lib / wpcap.lib — so the Windows leg installs the Npcap SDK and
# points the linker at it (the standard pcap-on-Windows recipe).

on:
  push:
    branches: [dev, main]
    paths:
      - 'mingoros/apps/mingoros-studio/**'
      - 'mingoros/crates/**'
      - 'mingoros/Cargo.toml'
      - 'mingoros/Cargo.lock'
      - '.github/workflows/mingoros-studio-ci.yml'
  pull_request:
    branches: [dev, main]
    paths:
      - 'mingoros/apps/mingoros-studio/**'
      - 'mingoros/crates/**'
      - 'mingoros/Cargo.toml'
      - 'mingoros/Cargo.lock'
      - '.github/workflows/mingoros-studio-ci.yml'
  workflow_dispatch:

concurrency:
  group: mingoros-studio-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NPCAP_SDK_VERSION: '1.13'

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            apt_deps: >-
              libwebkit2gtk-4.1-dev
              libgtk-3-dev
              libayatana-appindicator3-dev
              librsvg2-dev
              libudev-dev
              libpcap-dev
              pkg-config
          - os: macos-latest
            apt_deps: ''
          - os: windows-latest
            apt_deps: ''
    defaults:
      run:
        working-directory: mingoros/apps/mingoros-studio
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux WebKit / GTK build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_deps }}

      - name: Install Npcap SDK (Windows — pnet/RustDDS link deps)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://npcap.com/dist/npcap-sdk-$env:NPCAP_SDK_VERSION.zip"
          curl.exe -L -o "$env:RUNNER_TEMP\npcap-sdk.zip" $url
          Expand-Archive "$env:RUNNER_TEMP\npcap-sdk.zip" -DestinationPath "$env:RUNNER_TEMP\npcap-sdk"
          "LIB=$env:RUNNER_TEMP\npcap-sdk\Lib\x64;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.95.0'
          cache: false
          rustflags: ''

      - name: Cache cargo registry + target/
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'mingoros -> target'

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Generate platform icon variants
        run: npx --yes @tauri-apps/cli@^2 icon src-tauri/icons/icon.png

      - name: Type-check Svelte sources
        run: npm run check

      - name: Build frontend (production)
        run: npm run build

      - name: Cargo check the Tauri crate
        run: cargo check -p mingoros-studio
        working-directory: mingoros
